---

- name: Scenario 3b - basic storage functionality with backup
  hosts: localhost
  vars:
    prefix: scenario3b-
  tasks:
    - set_fact:
        prefix: "{{ (prefix + ( lookup('env', 'TASK_EXECUTOR_JOB_ID') | default(99999999 | random | to_uuid | hash('md5'), true) ) ) }}"

    - set_fact:
        volume_name: "{{ (prefix + '-test_volume_apimon') }}"
        snapshot_name: "{{ (prefix + '-test_snapshot_apimon') }}"
        backup_name: "{{ (prefix + '-test_backup_apimon') }}"

    - name: List Volumes
      openstack.cloud.volume_info:

    - name: Rescue block
      block:

        - name: Create Volume
          openstack.cloud.volume:
            state: present
            #availability_zone: eu-de-01
            size: 10
            name: "{{ volume_name }}"

        - name: List Snapshots
          openstack.cloud.volume_snapshot_info:
          tags: 'service=block_storage'

        - name: Create snapshot
          openstack.cloud.volume_snapshot:
            state: present
            name: "{{ snapshot_name }}"
            volume: "{{ volume_name }}"
            timeout: 1800
          register: snapshot
          tags: ["metric=create_volume_snapshot"]

        - name: Re-fetch info about snapshot
          openstack.cloud.volume_snapshot_info:
            name: "{{ snapshot_name }}"
          register: snapshot_info
          tags: 'service=block_storage'

        - name: Wait for snapshot to become available
          openstack.cloud.volume_snapshot_info:
            name: "{{ snapshot_name }}"
          register: refreshed
          until: refreshed.volume_snapshots | default([]) | length > 0
                 and refreshed.volume_snapshots[0].status == "available"
          retries: 30
          delay: 10
          changed_when: false

        - assert:
            that:
              - snapshot_info.volume_snapshots[0].status == 'available'

        - name: List Backups
          openstack.cloud.volume_backup_info:
          tags: 'service=block_storage'

        - name: Create backup
          openstack.cloud.volume_backup:
            state: "present"
            name: "{{ backup_name }}"
            volume: "{{ volume_name }}"
            snapshot: "{{ snapshot_name }}"
            timeout: 1800
          register: created_backup
          tags:
            - "service=block_storage"
            - "metric=create_volume_backup"
            - "az=default"

        - name: Wait for backup to become available
          openstack.cloud.volume_backup_info:
            name: "{{ backup_name }}"
          register: binfo
          until: binfo.volume_backups | default([]) | length > 0
                 and binfo.volume_backups[0].status == "available"
          retries: 60
          delay: 10
          changed_when: false
          tags:
            - "service=block_storage"
            - "metric=volume_backup_duration"  

        - name: Wait for 60 seconds before continuation
          pause:
            seconds: 60

        - name: Restore backup
          script: "restore_vbs.py {{ backup_name }}"
          args:
            executable: python3
          register: restored_backup
          tags:
            - "service=block_storage"
            - "metric=restore_volume_backup"

        - set_fact:
            job_id: "{{ restored_backup.stdout_lines | regex_search('job_id = ([A-Za-z0-9-]+)', '\\1') | first }}"        

        - name: Wait until job status is SUCCESS
          script: "query_vbs_job_id.py {{ job_id }}"
          args:
            executable: python3
          register: job_status_raw
          until: (job_status_raw.stdout_lines[0] | regex_replace('.*status:\\s*(\\w+).*', '\\1')) == "SUCCESS"
          retries: 120          # 10 minutes total
          delay: 5              # 5 seconds between checks
          changed_when: false
          tags:
            - "service=block_storage"
            - "metric=volume_restore_duration"  

        - name: Modify snapshot
          script: "modify_snapshot.py {{ snapshot_name }} {{ (snapshot_name + '_new') }}"
          args:
            executable: python3
          tags: 'service=block_storage'

      rescue:
        - name: Get info about backup
          openstack.cloud.volume_backup_info:
            name: "{{ backup_name }}"
          register: backup_info
          tags: 'service=block_storage'

        - name: Print backup info
          debug:
            var: backup_info

        - name: Get info about snapshot
          openstack.cloud.volume_snapshot_info:
            name: "{{ snapshot_name }}"
          register: snapshot_info
          tags: 'service=block_storage'

        - name: Print snapshot info
          debug:
            var: snapshot_info

        - name: Get info about volume
          openstack.cloud.volume_info:
            name: "{{ volume_name }}"
          tags: 'service=block_storage'
          register: volume_info

        - name: Print volume info
          debug:
            var: volume_info

      always:
        # If we failed - cleanup what we can
        - block:
            - name: Delete backup
              openstack.cloud.volume_backup:
                state: "absent"
                display_name: "{{ backup_name }}"
                timeout: 1800
              tags:
                - "service=block_storage"
                - "metric=delete_volume_backup"

            - name: Delete original snapshot
              openstack.cloud.volume_snapshot:
                state: absent
                display_name: "{{ snapshot_name }}"
                volume: "{{ volume_name }}"
                timeout: 1800
              tags:
                - "metric=delete_volume_snapshot"

            - name: Delete new snapshot
              openstack.cloud.volume_snapshot:
                state: absent
                display_name: "{{ (snapshot_name + '_new') }}"
                volume: "{{ volume_name }}"
                timeout: 1800

              # NOTE(gtema): metrics with same name will me merged together,
              # therefore pick the deletion of only single snapshot

            - name: Delete Volume
              openstack.cloud.volume:
                state: absent
                display_name: "{{ volume_name }}"
              tags:
                - "metric=delete_volume"
          ignore_errors: True
